---
- name: Get ip address of postgres container
  ansible.builtin.shell: docker inspect --format '{''{range.NetworkSettings.Networks}''}''{''{.IPAddress}''}''{''{end}''}' {{ postgres_hostname }}
  register: ip_address
  ignore_errors: true
  changed_when: false

- name: Setup postgres users.
  community.postgresql.postgresql_user:
    login_host: "{{ ip_address.stdout }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    db: postgres
    name: "{{ item.name }}"
    password: "{{ item.password }}"
  loop: "{{ postgres_users }}"

- name: Grant privilieges to users.
  community.postgresql.postgresql_privs:
    login_host: "{{ ip_address.stdout }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    db: "{{ item.1 }}"
    privs: SELECT
    objs: ALL_IN_SCHEMA
    role: "{{ item.0.name }}"
  loop: "{{ postgres_users | subelements('grant_databases', skip_missing=True) }}"

- name: Revoke privilieges to users.
  community.postgresql.postgresql_privs:
    login_host: "{{ ip_address.stdout }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    db: "{{ item.1.database }}"
    state: absent
    privs: SELECT
    objs: "{{ item.1.name }}"
    role: "{{ item.0.name }}"
  loop: "{{ postgres_users | subelements('revoke_tables', skip_missing=True) }}"
