---
- name: Include docker volume role
  ansible.builtin.include_role:
    name: docker_volume
  vars:
    docker_volume_name: "{{ open_webui_volume_name }}"
  when: open_webui_volume_name is defined

- name: Init {{ role_name }} env vars
  ansible.builtin.set_fact:
    open_webui_env:
      ENABLE_WEB_SEARCH: "{{ open_webui_web_search_enabled | string }}"
      WEB_SEARCH_PROVIDER: "ddgs"
      OAUTH_PROVIDER_NAME: "{{ open_webui_proivder_name }}"
      OAUTH_CLIENT_ID: "{{ open_webui_oauth_client_id }}"
      OAUTH_CLIENT_SECRET: "{{ open_webui_oauth_client_secret }}"
      OPENID_PROVIDER_URL: "{{ open_webui_openid_provider_url }}"
      ENABLE_OAUTH_SIGNUP: "true"
      ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
      OAUTH_ROLES_CLAIM: roles
      OAUTH_ALLOWED_ROLES: access
      OAUTH_ADMIN_ROLES: admin

- name: Append OpenAPI env vars
  ansible.builtin.set_fact:
    open_webui_env: "{{ open_webui_env | combine(item) }}"
  with_items:
    - OPENAI_API_BASE_URL: "{{ open_webui_openapi_url }}"
    - OPENAI_API_KEY: "{{ open_webui_openapi_secret }}"
  when: open_webui_openapi_url is defined

- name: Start {{ role_name }} container {{ open_webui_hostname }}
  community.docker.docker_container:
    name: "{{ open_webui_hostname }}"
    labels:
      description: "{{ open_webui_description }}"
    image: "{{ open_webui_image }}"
    restart_policy: unless-stopped
    env: "{{ open_webui_env }}"
    volumes: "{{ open_webui_volumes }}"
    ports: "{{ open_webui_ports }}"
    networks:
      - name: "{{ docker_network_name }}"
    log_driver: "{{ docker_log_driver }}"
    log_options:
      max-size: "{{ docker_log_max_size }}"
      max-file: "{{ docker_log_max_file }}"
      tag: "{{ open_webui_hostname }}|{{ role_name }}"
    memory: "2048m"
