        git -C "$repo_path" remote add origin "{{ item.url }}"
      fi
      git -C "$repo_path" fetch --depth=1 origin "{{ item.branch }}"
      git -C "$repo_path" checkout -f FETCH_HEAD
    else
      git init "$repo_path"
      git -C "$repo_path" config core.sparseCheckout true
      echo "{{ item.sparse_dirs | join('\n') }}" > "$repo_path/.git/info/sparse-checkout"
      git -C "$repo_path" remote add origin "{{ item.url }}"
      git -C "$repo_path" fetch --depth=1 origin "{{ item.branch }}"
      git -C "$repo_path" checkout FETCH_HEAD
    fi
  when:
    - item.url is regex('https://')
    - item.sparse_dirs is defined
  loop: "{{ odoo_repos }}"
  notify: Restart odoo container

- name: Add repo to git config
  community.general.git_config:
    name: safe.directory
    scope: global
    add_mode: add
    value: "{{ odoo_data_dir }}/{{ item.path }}"
  loop: "{{ odoo_repos }}"